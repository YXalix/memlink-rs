name: memlink CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Phase 1: Quick checks (fast feedback)
  check:
    name: Format, Clippy & Doc
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "memlink-rs"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (no default features)
        run: cargo clippy --workspace --no-default-features -- -D warnings

      - name: Generate documentation
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --no-default-features

  # Phase 1: Build and test without native dependencies
  build-no-native:
    name: Build & Test (No Native Features)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "memlink-rs"

      - name: Build workspace (no default features)
        run: cargo build --workspace --no-default-features --verbose

      - name: Run unit tests (no default features)
        run: cargo test --workspace --no-default-features --verbose

  # Phase 2: Full build with C library dependencies
  build-native:
    name: Build & Test (Native Features)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential clang libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "memlink-rs-native"

      - name: Build OBMM C library
        run: |
          cd modules/obmm-rs/obmm-sys
          mkdir -p build
          cd build
          cmake ..
          make

      - name: Build workspace (all features)
        run: cargo build --workspace --verbose

      - name: Run tests (all features)
        run: cargo test --workspace --verbose
        continue-on-error: true

      - name: Build release binary
        run: cargo build --release --bin memlink

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memlink-${{ github.sha }}
          path: |
            target/release/memlink
          retention-days: 7

  # Phase 3: Security audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
        continue-on-error: true

  # Phase 3: Code coverage
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: build-no-native
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --workspace --no-default-features --out Xml --verbose
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./cobertura.xml
          fail_ci_if_error: false
          verbose: true
        continue-on-error: true
